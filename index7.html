<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
}

.navbar{
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    position:sticky;
    top:0;
}

.logo{
    color:#1877f2;
    font-size:28px;
    font-weight:bold;
}

.search{
    padding:10px;
    border:none;
    border-radius:20px;
    background:#eee;
    width:250px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
    display:grid;
    grid-template-columns:250px 1fr 250px;
    gap:20px;
}

.sidebar,
.right-sidebar{
    background:#fff;
    border-radius:12px;
    padding:20px;
    height:fit-content;
}

.profile{
    text-align:center;
}

.profile img{
    width:80px;
    height:80px;
    border-radius:50%;
}

.feed{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.stories{
    background:#fff;
    border-radius:12px;
    padding:15px;
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.story{
    text-align:center;
}

.story img{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid hotpink;
}

.create-post{
    background:#fff;
    border-radius:12px;
    padding:20px;
}

.create-post textarea{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    resize:none;
    background:#f5f5f5;
    padding:10px;
    border-radius:10px;
}

.create-post button{
    margin-top:10px;
    background:#1877f2;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

.post{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.post-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
}

.post-header img{
    width:45px;
    height:45px;
    border-radius:50%;
}

.post img.post-image{
    width:100%;
}

.post-content{
    padding:15px;
}

.actions{
    display:flex;
    gap:20px;
    margin:10px 0;
}

.actions button{
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
}

.likes{
    font-weight:bold;
}

.friend{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.friend button{
    background:#1877f2;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
}

@media(max-width:900px){
.container{
    grid-template-columns:1fr;
}

.sidebar,
.right-sidebar{
    display:none;
}

.search{
    width:150px;
}
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">SocialHub</div>
    <input class="search" type="text" placeholder="Search...">
</nav>

<div class="container">

    <div class="sidebar">
        <div class="profile">
            <img src="https://i.pravatar.cc/150?img=5">
            <h3>Your Profile</h3>
            <p>@username</p>
        </div>
    </div>

    <div class="feed">

        <div class="stories">
            <div class="story">
                <img src="https://i.pravatar.cc/150?img=1">
                <p>John</p>
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/150?img=2">
                <p>Emma</p>
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/150?img=3">
                <p>Alex</p>
            </div>

            <div class="story">
                <img src="https://i.pravatar.cc/150?img=4">
                <p>Sophia</p>
            </div>
        </div>

        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind?"></textarea>
            <button onclick="createPost()">Post</button>
        </div>

        <div id="feedContainer">

            <div class="post">
                <div class="post-header">
                    <img src="https://i.pravatar.cc/150?img=1">
                    <h4>John Doe</h4>
                </div>

                <img class="post-image"
                src="https://picsum.photos/700/400?random=1">

                <div class="post-content">
                    <div class="actions">
                        <button onclick="likePost(this)">❤️</button>
                        <button>💬</button>
                        <button>📤</button>
                    </div>

                    <p class="likes">120 Likes</p>
                    <p>Beautiful day today ☀️</p>
                </div>
            </div>

        </div>

    </div>

    <div class="right-sidebar">
        <h3>Suggested Friends</h3>

        <br>

        <div class="friend">
            <span>Emma</span>
            <button>Follow</button>
        </div>

        <div class="friend">
            <span>Alex</span>
            <button>Follow</button>
        </div>

        <div class="friend">
            <span>Sophia</span>
            <button>Follow</button>
        </div>
    </div>

</div>

<script>
function likePost(btn){
    let likesText =
    btn.parentElement.nextElementSibling;

    let likes =
    parseInt(likesText.innerText);

    likes++;

    likesText.innerText =
    likes + " Likes";
}

function createPost(){

    const text =
    document.getElementById("postText").value;

    if(text.trim()===""){
        alert("Write something first!");
        return;
    }

    const post = document.createElement("div");
    post.className="post";

    post.innerHTML=`
        <div class="post-header">
            <img src="https://i.pravatar.cc/150?img=5">
            <h4>You</h4>
        </div>

        <div class="post-content">
            <div class="actions">
                <button onclick="likePost(this)">❤️</button>
                <button>💬</button>
                <button>📤</button>
            </div>

            <p class="likes">0 Likes</p>
            <p>${text}</p>
        </div>
    `;

    document
    .getElementById("feedContainer")
    .prepend(post);

    document
    .getElementById("postText")
    .value="";
}
</script>

</body>
</html>
